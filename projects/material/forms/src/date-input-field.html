<mat-form-field *ngIf="control|async as ctrl">
  <input
    matInput
    [matDatepicker]="picker"
    [attr.aria-label]="instance!|ajfNodeCompleteName"
    [min]="instance!.node.minDate|ajfDateValueString"
    [max]="instance!.node.maxDate|ajfDateValueString"
    [formControl]="ctrl!"
    readonly
  />
  <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
  <mat-datepicker #picker>
    <mat-datepicker-actions>
      <button mat-button (click)="clear(ctrl); picker.close()">{{'Clear'|transloco}}</button>
      <button mat-raised-button color="primary" matDatepickerApply>{{'OK'|transloco}}</button>
    </mat-datepicker-actions>
  </mat-datepicker>
</mat-form-field>
